name: Main Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: community-frontend

jobs:
  build_and_push:
    name: Build And Push Frontend Image

    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}

    steps:
      # GitHub Actions Runner로 Repository 코드 가져오기
      - name: Checkout Repository
        uses: actions/checkout@v5

      # JavaScript 문법 검사를 위한 Node.js 설정
      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      # 프로젝트 JavaScript 파일 문법 검사
      - name: Check JavaScript Syntax
        run: |
          find . \
            -type f \
            -name "*.js" \
            -not -path "./node_modules/*" \
            -exec node --check {} \;

      # GitHub OIDC를 이용하여 AWS IAM Role Assume
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # AWS ECR 로그인
      - name: Login To Amazon ECR
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2

      # main-커밋해시 형식의 Docker Image Tag 생성
      - name: Set Image Tag
        id: set_tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_TAG="main-${SHORT_SHA}"

          echo "IMAGE_TAG=${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"

      # Frontend Docker Image Build 및 ECR Push
      - name: Build And Push Frontend Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login_ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.set_tag.outputs.image_tag }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          echo "Build image: ${IMAGE_URI}"

          docker build \
            -t "${IMAGE_URI}" \
            .

          docker push "${IMAGE_URI}"

  deploy:
    name: Deploy Frontend To EC2

    needs:
      - build_and_push

    runs-on: ubuntu-latest

    steps:
      # GitHub OIDC를 이용하여 AWS IAM Role Assume
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # SSM을 통해 Frontend EC2에 배포 명령 전달
      - name: Deploy Frontend With SSM
        env:
          FRONTEND_INSTANCE_ID: ${{ secrets.FRONTEND_INSTANCE_ID }}
          IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
        run: |
          REMOTE_SCRIPT=$(cat <<EOF
          #!/bin/bash

          set -euo pipefail

          cd /home/ubuntu/community-docker

          NEW_TAG="${IMAGE_TAG}"

          PREVIOUS_TAG=\$(
            grep "^FRONTEND_TAG=" .env \
            | cut -d= -f2 \
            || true
          )

          if [ -z "\${PREVIOUS_TAG}" ]; then
            echo "Previous frontend image tag was not found"
            exit 1
          fi

          echo "Previous tag: \${PREVIOUS_TAG}"
          echo "Deploy tag: \${NEW_TAG}"

          rollback() {
            echo "Start rollback: \${PREVIOUS_TAG}"

            if ! ./deploy-frontend.sh "\${PREVIOUS_TAG}"; then
              echo "Rollback deployment failed"
              return 1
            fi

            for attempt in \$(seq 1 12); do
              echo "Rollback health check: \${attempt}/12"

              if curl \
                --fail \
                --silent \
                http://127.0.0.1/health \
                > /dev/null; then

                echo "Rollback health check succeeded"
                return 0
              fi

              sleep 5
            done

            echo "Rollback health check failed"
            return 1
          }

          if ! ./deploy-frontend.sh "\${NEW_TAG}"; then
            echo "New frontend deployment failed"

            rollback || true

            exit 1
          fi

          HEALTH_CHECK_SUCCESS=false

          for attempt in \$(seq 1 12); do
            echo "Frontend health check: \${attempt}/12"

            if curl \
              --fail \
              --silent \
              http://127.0.0.1/health \
              > /dev/null; then

              HEALTH_CHECK_SUCCESS=true
              break
            fi

            sleep 5
          done

          if [ "\${HEALTH_CHECK_SUCCESS}" != "true" ]; then
            echo "Frontend health check failed"

            echo "===== Container Status ====="

            docker ps -a \
              --filter "name=community-frontend"

            echo "===== Container Logs ====="

            docker logs \
              --tail=100 \
              community-frontend \
              || true

            rollback || true

            exit 1
          fi

          echo "Frontend deployment succeeded"

          docker ps \
            --filter "name=community-frontend"

          grep "^FRONTEND_TAG=" .env
          EOF
          )

          ENCODED_SCRIPT=$(
            printf "%s" "${REMOTE_SCRIPT}" \
            | base64 -w 0
          )

          COMMAND_ID=$(
            aws ssm send-command \
              --instance-ids "${FRONTEND_INSTANCE_ID}" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy frontend ${IMAGE_TAG}" \
              --parameters \
              "commands=[\"echo ${ENCODED_SCRIPT} | base64 --decode | bash\"]" \
              --query "Command.CommandId" \
              --output text
          )

          echo "SSM Command ID: ${COMMAND_ID}"

          set +e

          aws ssm wait command-executed \
            --command-id "${COMMAND_ID}" \
            --instance-id "${FRONTEND_INSTANCE_ID}"

          WAIT_EXIT_CODE=$?

          set -e

          STATUS=$(
            aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${FRONTEND_INSTANCE_ID}" \
              --query "Status" \
              --output text
          )

          echo "===== SSM STATUS ====="

          echo "${STATUS}"

          echo "===== SSM STDOUT ====="

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${FRONTEND_INSTANCE_ID}" \
            --query "StandardOutputContent" \
            --output text

          echo "===== SSM STDERR ====="

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${FRONTEND_INSTANCE_ID}" \
            --query "StandardErrorContent" \
            --output text

          if [ "${WAIT_EXIT_CODE}" -ne 0 ] || [ "${STATUS}" != "Success" ]; then
            echo "Frontend deployment failed"

            exit 1
          fi